name: Update 5G Operator Data

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Also allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run data updater
        run: python scripts/update_data.py

      - name: Check if data changed
        id: check-changes
        run: |
          if git diff --quiet data/operators.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated data
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config --global user.name "5G Dashboard Bot"
          git config --global user.email "bot@5gdashboard.noreply"
          git add data/operators.json
          git commit -m "chore: update 5G operator data [$(date +%Y-%m-%d)]"
          git push

      - name: No changes detected
        if: steps.check-changes.outputs.changed == 'false'
        run: echo "Data is already up to date. No commit needed."
